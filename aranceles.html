<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aranceles Activos - RyR Multipagos</title>
<style>
    body {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        padding: 40px;
        color: #333;
        max-width: 820px;
        margin: 0 auto;
        background: #f7f9fb;
    }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
    h1 { color: #dc2626; margin: 0 0 4px 0; font-size: 26px; }
    .subtitle { font-size: 13px; color: #999; margin: 0; letter-spacing: 0.05em; text-transform: uppercase; }
    .badge { background: #fee2e2; color: #dc2626; border-radius: 20px; padding: 4px 14px; font-size: 12px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; }
    .section-title {
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        padding: 6px 14px;
        border-radius: 8px;
        display: inline-block;
        margin-bottom: 12px;
        margin-top: 30px;
    }
    .purple { background: #f5f3ff; color: #7e22ce; }
    .yellow { background: #fffbeb; color: #d97706; }
    .orange { background: #fff7ed; color: #ea580c; }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 8px;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    th {
        background: #f8f9fa;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #999;
        padding: 10px 16px;
        text-align: left;
        border-bottom: 1px solid #eee;
    }
    td { padding: 11px 16px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; }
    td:last-child { font-family: monospace; font-weight: 900; font-size: 15px; }
    td.costo { color: #64748b; font-size: 13px; }
    .footer { margin-top: 50px; text-align: center; font-size: 11px; color: #bbb; letter-spacing: 0.1em; text-transform: uppercase; }
    @media print {
        body { background: white; padding: 0; }
        @page { margin: 2cm; }
        table { box-shadow: none; border: 1px solid #ddd; }
    }
</style>
</head>
<body>

<div class="header">
    <div>
        <h1>Listado de Coeficientes Activos</h1>
        <p class="subtitle">Sistema Multipagos &mdash; RyR Computación</p>
    </div>
    <div>
        <span class="badge" id="version-badge">Cargando...</span>
        <p class="subtitle" id="fecha-badge" style="text-align:right; margin-top:6px;"></p>
    </div>
</div>

<div id="tablas"></div>

<div class="footer">RyR Computación &copy; &mdash; <span id="year"></span></div>

<script src="planes.js"></script>
<script>
    document.getElementById('year').textContent = new Date().getFullYear();
    document.getElementById('version-badge').textContent = 'Aranceles ' + PLANES_UPDATED;
    document.getElementById('fecha-badge').textContent = 'Versión: ' + PLANES_VERSION;

    const teamConfig = {
        'Unicobros': { label: 'Terminal Unicobros',         cssClass: 'purple' },
        'MP Point':  { label: 'Terminal Mercado Pago Point', cssClass: 'yellow' },
        'Fiserv':    { label: 'Terminal Fiserv',            cssClass: 'orange' }
    };

    const teams = ['Unicobros', 'MP Point', 'Fiserv'];
    const container = document.getElementById('tablas');

    teams.forEach(team => {
        const plans = DEFAULT_PLANS.filter(p => p.team === team);
        const cfg   = teamConfig[team];

        const title = document.createElement('div');
        title.className = 'section-title ' + cfg.cssClass;
        title.textContent = cfg.label;
        container.appendChild(title);

        const table = document.createElement('table');
        table.innerHTML = `
            <tr>
                <th>Plan</th>
                <th>Coeficiente</th>
                <th>% Total a Recargar</th>
            </tr>
            ${plans.map(p => {
                const pct = ((p.coefficient - 1) * 100).toFixed(2);
                return `<tr>
                    <td>${p.name}</td>
                    <td class="${cfg.cssClass}" style="font-family:monospace;font-weight:900;font-size:15px">${p.coefficient.toFixed(4)}</td>
                    <td class="costo">+${pct}%</td>
                </tr>`;
            }).join('')}
        `;
        container.appendChild(table);
    });
</script>

</body>
</html>
